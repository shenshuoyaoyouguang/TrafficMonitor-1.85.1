name: Release CI
on: push
jobs:

  x64_build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
      
    - name: Run msbuild
      run: msbuild -p:configuration=release -p:platform=x64 -p:platformToolset=v143
      
    - name: Get current time
      uses: josStorer/get-current-time@v2.0.2
      id: current-time
      with:
        format: YYYYMMDD_HHmmss
        utcOffset: "+08:00"
      
    - name : Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x64_${{ steps.current-time.outputs.formattedTime }}_TrafficMonitor
        path: |
          Bin/x64/Release/TrafficMonitor.exe
          Bin/x64/Release/*.dll

    - name : Upload pdb files
      uses: actions/upload-artifact@v4
      with:
        name: x64_${{ steps.current-time.outputs.formattedTime }}_pdb
        path: Bin/x64/Release/*.pdb

  x86_build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
      
    - name: Run msbuild
      run: msbuild -p:configuration=release -p:platform=x86 -p:platformToolset=v143
      
    - name: Get current time
      uses: josStorer/get-current-time@v2.0.2
      id: current-time
      with:
        format: YYYYMMDD_HHmmss
        utcOffset: "+08:00"
      
    - name : Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x86_${{ steps.current-time.outputs.formattedTime }}_TrafficMonitor
        path: |
          Bin/Release/TrafficMonitor.exe
          Bin/Release/*.dll
      
    - name : Upload pdb files
      uses: actions/upload-artifact@v4
      with:
        name: x86_${{ steps.current-time.outputs.formattedTime }}_pdb
        path: Bin/Release/*.pdb

  arm64ec_build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
      
    - name: Run msbuild
      run: msbuild -p:configuration=release -p:platform=ARM64EC -p:platformToolset=v143
      
    - name: Get current time
      uses: josStorer/get-current-time@v2.0.2
      id: current-time
      with:
        format: YYYYMMDD_HHmmss
        utcOffset: "+08:00"

    - name: Move dll file path 
      run: mv Bin/x64/Release/*.dll  Bin/ARM64EC/Release/

    - name : Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm64EC_${{ steps.current-time.outputs.formattedTime }}_TrafficMonitor
        path: |
          Bin/ARM64EC/Release/TrafficMonitor.exe
          Bin/ARM64EC/Release/*.dll

    - name : Upload pdb files
      uses: actions/upload-artifact@v4
      with:
        name: arm64EC_${{ steps.current-time.outputs.formattedTime }}_pdb
        path: Bin/ARM64EC/Release/*.pdb

  release:
    runs-on: windows-latest
    needs: [x64_build, x86_build, arm64ec_build]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: "*_TrafficMonitor"

    - name: Extract release notes
      shell: pwsh
      run: |
        $lines = Get-Content UpdateLog/update_log.md
        $start = -1
        $end = $lines.Length
        for ($i = 0; $i -lt $lines.Length; $i++) {
          if ($lines[$i] -match '^##\s+V') { $start = $i; break }
        }
        if ($start -lt 0) { throw "No version section found in UpdateLog/update_log.md" }
        for ($i = $start + 1; $i -lt $lines.Length; $i++) {
          if ($lines[$i] -match '^##\s+V') { $end = $i; break }
        }
        $section = $lines[$start..($end - 1)]
        $section | Out-File -FilePath release_notes.md -Encoding utf8

    - name: Prepare extra assets
      shell: pwsh
      run: |
        $assetsRoot = "release_assets"
        New-Item -ItemType Directory -Force -Path $assetsRoot | Out-Null

        Copy-Item -Recurse -Force "TrafficMonitor/skins" (Join-Path $assetsRoot "skins")

        $manifestSrc = "TrafficMonitor/TrafficMonitor.VisualElementsManifest.xml"
        $logoSrc = "TrafficMonitor/Logo"
        if (-not (Test-Path $manifestSrc)) { throw "Missing $manifestSrc. Please add it to the repo before releasing." }
        if (-not (Test-Path $logoSrc)) { throw "Missing $logoSrc. Please add it to the repo before releasing." }

        Copy-Item -Force $manifestSrc (Join-Path $assetsRoot "TrafficMonitor.VisualElementsManifest.xml")
        Copy-Item -Recurse -Force $logoSrc (Join-Path $assetsRoot "Logo")

    - name: Package release assets
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        New-Item -ItemType Directory -Force -Path release | Out-Null
        Get-ChildItem -Path dist -Directory | Where-Object { $_.Name -like "*_TrafficMonitor" } | ForEach-Object {
          Copy-Item -Recurse -Force "release_assets/skins" $_.FullName
          Copy-Item -Recurse -Force "release_assets/Logo" $_.FullName
          Copy-Item -Force "release_assets/TrafficMonitor.VisualElementsManifest.xml" $_.FullName
          $arch = $_.Name.Split('_')[0]
          $zip = Join-Path release "TrafficMonitor_${tag}_${arch}.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path (Join-Path $_.FullName "*") -DestinationPath $zip
        }

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body_path: release_notes.md
        files: release/*.zip
